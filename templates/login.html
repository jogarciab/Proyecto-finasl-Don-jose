<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Don José</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="contenedor">

<h1>Don José</h1>

<h3>Iniciar sesión</h3>

<form action="/login" method="POST">

<input
type="text"
name="usuario"
placeholder="Ingrese su Rol"
required>

<input
type="password"
name="password"
placeholder="Contraseña"
required>

<button type="submit">

Ingresar

</button>

</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación</title>
    <!-- CSS -->
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/facturacion.css') }}">
    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="phone">
        <!-- HEADER -->
        <header class="header">
            <h2>Facturación</h2>
            <div class="cart">
                <i class="fa-solid fa-receipt"></i>
            </div>
        </header>
        <!-- TOPBAR -->
        <div class="history-topbar">
            <!-- BOTON VOLVER -->
            <div class="back-btn" onclick="goHome()">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <!-- BUSCADOR -->
            <input type="text" placeholder="Buscar factura">
        </div>
        <!-- FACTURAS -->
        <div class="history-container">
            <!-- CARD -->
            <div class="history-card">
                <img src="{{ url_for('static', filename='img/vasos.png') }}" alt="">
                <div class="history-info">
                    <h3>Factura #001</h3>
                    <p>Cliente: Juan</p>
                </div>
                <div class="history-date">
                    <span>Hoy</span>
                    <p>$15000</p>
                </div>
            </div>
            <!-- CARD -->
            <div class="history-card">
                <img src="{{ url_for('static', filename='img/plato-plano.png') }}" alt="">
                <div class="history-info">
                    <h3>Factura #002</h3>
                    <p>Cliente: Maria</p>
                </div>
                <div class="history-date">
                    <span>15/05/2026</span>
                    <p>$9000</p>
                </div>
            </div>
            <!-- CARD -->
            <div class="history-card">
                <img src="{{ url_for('static', filename='img/tenedor.png') }}" alt="">
                <div class="history-info">
                    <h3>Factura #003</h3>
                    <p>Cliente: Carlos</p>
                </div>
                <div class="history-date">
                    <span>14/05/2026</span>
                    <p>$21000</p>
                </div>
            </div>
        </div>
    </div>
    <!-- JS -->
    <script src="{{ url_for('static', filename='js/facturacion.js') }}"></script>
</body>
</html>
